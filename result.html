<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Результат — Бизнесмен на день</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- Подключаем html2canvas для генерации карточки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- ХЕАДЕР С ИЗОБРАЖЕНИЕМ -->
        <div class="header">
            <img src="img/header-bg.jpg" alt="Бизнесмен на день" />
        </div>

        <div class="content" id="resultContent">
            <div class="result-card">
                <!-- ИЗОБРАЖЕНИЕ ТИПАЖА -->
                <div id="resultImage"></div>

                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:300; color:#7a7266;">Ваш типаж</span>
                    <span class="badge-result" id="resultBadge">⭐</span>
                </div>
                <div class="result-type" id="resultType">Бизнесмен-визионер</div>
                <div class="result-desc" id="resultDesc">Описание типажа</div>
                <div style="margin-top:14px;">
                    <i class="fas fa-coins" style="color:#DE1A1A;"></i>
                    <span id="resultBalance">500 000 ₽</span>
                </div>
            </div>

            <h4 style="margin:6px 0 4px;">📋 Ваш выбор по лотам</h4>
            <table class="lot-table">
                <thead><tr><th>Лот</th><th>Решение</th></tr></thead>
                <tbody id="resultTableBody"></tbody>
            </table>

            <div class="finish-cta">
                🏁 Беги за призом в шатёр РЖД «Управление имуществом»!
            </div>

            <button class="result-share" id="shareBtn">
                <i class="fas fa-share-alt"></i> Поделиться в историях
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initResultPage();

            // --- РЕАЛЬНЫЙ ШЕРИНГ С ГЕНЕРАЦИЕЙ КАРТОЧКИ ---
            document.getElementById('shareBtn').addEventListener('click', function() {
                const type = document.getElementById('resultType').textContent;
                const desc = document.getElementById('resultDesc').textContent;
                const balance = document.getElementById('resultBalance').textContent;

                // Показываем уведомление о генерации
                const btn = this;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Генерация...';
                btn.disabled = true;

                // Создаём временную карточку для скриншота
                const card = document.createElement('div');
                card.style.cssText = `
                    position: fixed;
                    left: -9999px;
                    top: 0;
                    width: 1080px;
                    height: 1920px;
                    background: #DE1A1A;
                    padding: 60px 80px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
                    color: white;
                    text-align: center;
                    z-index: 9999;
                `;

                card.innerHTML = `
                    <!-- Декоративные линии -->
                    <div style="position:absolute; top:40px; left:40px; right:40px; bottom:40px; border:2px solid rgba(255,255,255,0.1); border-radius:30px; pointer-events:none;"></div>
                    
                    <!-- Иконка-эмодзи вместо логотипа -->
                    <div style="font-size:100px; margin-bottom:10px;">🏢</div>
                    
                    <!-- Заголовок -->
                    <div style="font-size:64px; font-weight:800; letter-spacing:2px; line-height:1.2; margin-bottom:10px;">
                        БИЗНЕСМЕН<br/>НА ДЕНЬ
                    </div>
                    
                    <!-- Разделитель -->
                    <div style="width:120px; height:3px; background:rgba(255,255,255,0.3); margin:16px auto; border-radius:4px;"></div>
                    
                    <!-- Типаж -->
                    <div style="font-size:38px; font-weight:600; background:rgba(255,255,255,0.12); padding:14px 40px; border-radius:60px; border:2px solid rgba(255,255,255,0.15); margin-top:10px;">
                        ${type}
                    </div>
                    
                    <!-- Описание -->
                    <div style="font-size:26px; opacity:0.9; max-width:85%; line-height:1.5; margin-top:20px;">
                        ${desc}
                    </div>
                    
                    <!-- Баланс -->
                    <div style="margin-top:40px; font-size:22px; opacity:0.7; background:rgba(255,255,255,0.08); padding:12px 32px; border-radius:40px;">
                        💰 Остаток на счету: ${balance}
                    </div>
                    
                    <!-- Хештеги -->
                    <div style="margin-top:50px; font-size:18px; opacity:0.3; border-top:1px solid rgba(255,255,255,0.15); padding-top:30px; width:60%; letter-spacing:1px;">
                        #БизнесменНаДень #РЖД
                    </div>
                    
                    <!-- Логотип внизу -->
                    <div style="position:absolute; bottom:50px; font-size:14px; opacity:0.2; letter-spacing:2px;">
                        РЖД УПРАВЛЕНИЕ ИМУЩЕСТВОМ
                    </div>
                `;
                document.body.appendChild(card);

                // Генерируем скриншот
                html2canvas(card, {
                    scale: 0.7,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#DE1A1A',
                    logging: false,
                    width: 1080,
                    height: 1920
                }).then(canvas => {
                    // Удаляем временную карточку
                    card.remove();
                    
                    // Восстанавливаем кнопку
                    btn.innerHTML = originalText;
                    btn.disabled = false;

                    // Конвертируем в Blob для шеринга
                    canvas.toBlob(function(blob) {
                        if (!blob) {
                            alert('Не удалось создать изображение. Попробуйте ещё раз.');
                            return;
                        }

                        const file = new File([blob], `biznesmen-${type}-${Date.now()}.png`, { type: 'image/png' });

                        // Пытаемся поделиться через Web Share API
                        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                            navigator.share({
                                files: [file],
                                title: 'Бизнесмен на день',
                                text: `Мой типаж: ${type}`
                            }).catch(function(err) {
                                // Если шеринг отменён или не удался — скачиваем
                                if (err.name !== 'AbortError') {
                                    downloadImage(canvas);
                                }
                            });
                        } else {
                            // Если Web Share API не поддерживается — скачиваем
                            downloadImage(canvas);
                        }
                    }, 'image/png');
                }).catch(function(err) {
                    card.remove();
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    alert('Не удалось сгенерировать карточку. Попробуйте ещё раз.');
                    console.error('html2canvas error:', err);
                });
            });

            // Функция для скачивания изображения
            function downloadImage(canvas) {
                const link = document.createElement('a');
                const type = document.getElementById('resultType').textContent;
                link.download = `biznesmen-${type}-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });
    </script>
</body>
</html>
