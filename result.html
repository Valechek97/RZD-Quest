<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Результат — Бизнесмен на день</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-logo">
                <img src="img/rzd-logo.png" alt="РЖД" />
            </div>
            <div class="header-title">
                <span class="line1">НЕДВИЖИМОСТЬ</span>
                <span class="line2">ПО ВСЕЙ СТРАНЕ</span>
            </div>
        </div>

        <div class="content" id="resultContent">
            <div class="result-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:300; color:#7a7266;">Ваш типаж</span>
                    <span class="badge-result" id="resultBadge">⭐</span>
                </div>
                <div class="result-type" id="resultType">Бизнесмен-визионер</div>
                <div class="result-desc" id="resultDesc">Описание типажа</div>
                <div style="margin-top:14px;">
                    <i class="fas fa-coins" style="color:#DE1A1A;"></i>
                    <span id="resultBalance">1 000 000 ₽</span>
                </div>
            </div>

            <h4 style="margin:6px 0 4px;">📋 Ваш выбор по лотам</h4>
            <table class="lot-table">
                <thead><tr><th>Лот</th><th>Решение</th></tr></thead>
                <tbody id="resultTableBody"></tbody>
            </table>

            <div class="finish-cta">
                🏁 Беги за призом в шатёр РЖД «Управление имуществом»!
            </div>

            <button class="result-share" id="shareBtn">
                <i class="fas fa-share-alt"></i> Поделиться в историях
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initResultPage();

            document.getElementById('shareBtn').addEventListener('click', function() {
                alert('📸 Карточка для шеринга (PNG/SVG) сгенерирована! (имитация)');
            });
        });
    </script>
</body>
</html>
