<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Бизнесмен на день — старт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="app">
        <!-- ХЕАДЕР С ИЗОБРАЖЕНИЕМ -->
        <div class="header">
            <img src="img/header-bg.jpg" alt="Бизнесмен на день" />
        </div>

        <div class="content">
            <!-- Заголовок — ЧЁРНЫЙ -->
            <div class="start-title">
                <span class="line1">КВЕСТ-ИГРА</span>
                <span class="line2">«БИЗНЕСМЕН НА ДЕНЬ»</span>
            </div>

            <!-- Описание — крупнее, тёмно-серый, по центру -->
            <p class="start-description">
                Определи свой тип предпринимателя, принимая решения<br/>
                о приобретении объектов от компании<br/>
                «РЖД управление имуществом»
            </p>

            <!-- Подпись перед полем ввода -->
            <div class="input-label">Имя бизнесмена</div>

            <!-- Поле ввода имени на светло-сером фоне -->
            <div class="input-wrapper">
                <input type="text" id="playerName" class="input-name" placeholder="Введите ваше имя" />
            </div>

            <!-- Кнопка "НАЧАТЬ" — только подчёркнутые красные буквы -->
            <button class="btn-start-text" id="startBtn">НАЧАТЬ</button>

            <div style="margin-top:16px; font-size:13px; color:#8a8276; text-align:center;">
                * сессия сохраняется на устройстве
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initStartPage);
    </script>
</body>
</html>
